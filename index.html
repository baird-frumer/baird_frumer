<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>baird的主页 </title>
    <style>
        /* 重置默认边距，使用优雅的现代字体 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            /* ===== 最底层背景图片 ===== */
            /* 🎯 把下面的图片URL换成你自己的就行 */
            background-image: url('zc.jpg');
            /* 背景铺满整个屏幕，不重复 */
            background-size: cover;
            /* 背景固定，滚动时不动 */
            background-attachment: fixed;
            /* 图片居中显示 */
            background-position: center;
            
            font-family: system-ui, 'Segoe UI', 'Helvetica Neue', 'Noto Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            /* 添加半透明黑色层，让背景图片变暗，上面的文字更清楚（可选，不需要可以删掉下一行） */
            background-blend-mode: overlay;
            padding-bottom:120vh;
            .hero-img {
    width: 100%;
    height: 0;
    /* 关键：高度由 padding-bottom 决定，实现精确比例裁剪 */
    padding-bottom: 90%;  /* 100% - 10% = 90%，即裁掉底部10% */
    object-fit: cover;
    object-position: top;  /* 从顶部开始显示，底部自然被裁掉 */
    display: block;
            }
        }

        /* 可选：如果你觉得背景图片太亮导致文字看不清，可以用这个伪元素加一层半透明遮罩 */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.4); /* 黑色半透明层，数值越小越透明，越大越暗 */
            z-index: 0;
            pointer-events: none; /* 让遮罩不干扰点击 */
        }

        /* 让卡片在遮罩层之上 */
        .card {
            position: relative;
            z-index: 1;
            max-width: 800px;
            width: 100%;
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(2px);
            border-radius: 2.5rem;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.2), 0 4px 12px rgba(0, 0, 0, 0.05);
            padding: 2rem 1.8rem 2.5rem 1.8rem;
            transition: all 0.2s ease;
            border: 1px solid rgba(255, 255, 255, 0.5);
            text-align: center;
        }

        .image-wrapper {
            margin-bottom: 2rem;
            display: flex;
            justify-content: center;
            border-radius: 2rem;
            overflow: hidden;
            box-shadow: 0 12px 28px -8px rgba(0, 0, 0, 0.15);
            background: #fff;
            transition: transform 0.2s;
        }

        .image-wrapper:hover {
            transform: scale(1.01);
        }

        .hero-img {
            width: 100%;
            height: auto;
            display: block;
            object-fit: contain;
            max-height: 480px;
            transition: opacity 0.3s;
        }

        .message-section {
            padding: 0 0.5rem;
        }

        .poem-text {
            font-size: 1.8rem;
            font-weight: 500;
            line-height: 1.35;
            background: linear-gradient(135deg, #1f2b3c, #2c3e50);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 0.75rem;
            letter-spacing: -0.01em;
        }

        .description {
            font-size: 1.1rem;
            color: #334155;
            margin-top: 0.75rem;
            border-top: 2px solid #e2e8f0;
            display: inline-block;
            padding-top: 1rem;
            font-weight: 400;
            max-width: 90%;
            line-height: 1.5;
        }

        .footer-note {
            margin-top: 2rem;
            font-size: 0.8rem;
            color: #6c7a91;
            letter-spacing: 0.3px;
            border-top: 1px solid #e2edf2;
            padding-top: 1.2rem;
            display: inline-block;
            width: auto;
        }

        @media (max-width: 580px) {
            .card {
                padding: 1.5rem 1.2rem 2rem;
            }
            .poem-text {
                font-size: 1.5rem;
            }
            .description {
                font-size: 1rem;
            }
            .image-wrapper {
                border-radius: 1.5rem;
            }
        }

        @media (prefers-color-scheme: dark) {
            .card {
                background: rgba(25, 30, 38, 0.88);
                backdrop-filter: blur(3px);
                border-color: rgba(70, 85, 105, 0.4);
                box-shadow: 0 25px 40px -12px black;
            }
            .poem-text {
                background: linear-gradient(135deg, #e6edf5, #cbdbe6);
                background-clip: text;
                -webkit-background-clip: text;
                color: transparent;
            }
            .description {
                color: #cbd5e6;
                border-top-color: #2d3a48;
            }
            .footer-note {
                color: #8e9daf;
                border-top-color: #2d3a48;
            }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="image-wrapper">
            < img class="hero-img" 
                 src="anan.jpg" 
                 alt="宁静的自然风景：充满生命力的山脉与湖泊"
                 title="每日一景 · 静谧时光">
        </div>
        <div class="message-section">
            <div class="poem-text">
                与其疲于奔命<br>不如多花些时间<br>去看看世界本身
            </div>
            <div class="footer-note">
                ✦ 保持纯粹 · 奔赴山海 ✦
            </div>
        </div>
    </div>
</body>
</html>
